<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM 直播伴侣</title>
    <link rel="stylesheet" href="style.css">
    <script src="shared.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #252526;
            --border-color: #3e3e42;
            --text-color: #cccccc;
            --accent-color: #0e639c;
            --danger-color: #f14c4c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #2d2d2d;
            border-bottom: 1px solid var(--border-color);
            padding: 0 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #fff;
            border-bottom-color: var(--accent-color);
        }
        .tab-btn:hover {
            color: #fff;
        }

        /* Layout */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
        }
        .tab-content.active {
            display: flex;
        }

        /* Live Tab Layout */
        .live-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .config-sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }
        .feed-main {
            flex: 1;
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 15px;
        }

        /* Chat Tab Layout */
        .chat-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .video-large-container {
            flex: 1;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .chat-sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        /* Video Elements */
        video#previewVideo {
            width: 100%;
            height: auto;
            background: #000;
        }
        .video-container-small video {
            max-height: 200px;
            object-fit: contain;
        }
        .video-container-large video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Config Elements */
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        input, select, textarea {
            width: 100%;
            padding: 6px;
            background-color: #3c3c3c;
            border: 1px solid #3c3c3c;
            color: #fff;
            border-radius: 2px;
            box-sizing: border-box;
        }
        button {
            padding: 6px 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover {
            opacity: 0.9;
        }
        button.danger { background-color: var(--danger-color); }
        button.secondary { background-color: #444; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .hidden { display: none !important; }

        /* Feed Items (Live Tab) */
        .feed-item {
            display: flex;
            margin-bottom: 10px;
            background: #2d2d2d;
            border-radius: 4px;
            padding: 10px;
            align-items: flex-start;
        }
        .feed-timestamp {
            font-family: monospace;
            color: #888;
            font-size: 12px;
            margin-right: 10px;
            min-width: 60px;
        }
        .feed-content {
            flex: 1;
        }
        .feed-image {
            max-width: 200px; /* Smaller images as requested */
            border-radius: 4px;
            display: block;
        }
        .feed-text {
            font-size: 14px;
            line-height: 1.4;
        }

        /* Chat Items */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message.user {
            background-color: #2b3a42;
            align-self: flex-end;
            margin-left: 20px;
        }
        .message.assistant {
            background-color: #333;
            margin-right: 20px;
        }
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }
        .chat-input-area textarea {
            flex: 1;
            resize: none;
            height: 40px;
        }

        .context-preview {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            background: #222;
            max-height: 180px;
            overflow-y: auto;
        }
        .context-preview-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .context-preview-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            border-top: 1px solid #2f2f2f;
        }
        .context-preview-item:first-child {
            border-top: none;
        }
        .context-preview-ts {
            font-family: monospace;
            color: #888;
            font-size: 11px;
            min-width: 58px;
        }
        .context-preview-thumb {
            width: 54px;
            height: 32px;
            object-fit: cover;
            border-radius: 4px;
            background: #000;
            flex: 0 0 auto;
        }
        .context-preview-text {
            font-size: 12px;
            line-height: 1.3;
            color: #ddd;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Config Modal */
        .config-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
        }

        :root {
            --bg: #0e0f12;
            --panel: #151820;
            --panel-2: #0f1116;
            --border: #2a2f3a;
            --text: #e6e6e6;
            --muted: #9aa4b2;
            --accent: #4da3ff;
            --accent-2: #2b7fe5;
            --danger: #ff5d5d;
            --chip: #1b1f28;
            --bg-color: var(--bg);
            --panel-bg: var(--panel);
            --border-color: var(--border);
            --text-color: var(--text);
            --accent-color: var(--accent);
            --danger-color: var(--danger);
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app-root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(21, 24, 32, 0.95);
            backdrop-filter: blur(8px);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .brand {
            font-weight: 650;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .pill {
            font-size: 12px;
            color: var(--muted);
            background: var(--chip);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .workspace {
            flex: 1;
            min-height: 0;
            display: flex;
        }

        .stage {
            flex: 1;
            min-width: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-stage {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video#previewVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .side {
            width: 420px;
            min-width: 360px;
            max-width: 520px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .side-tabs {
            display: flex;
            gap: 6px;
            padding: 8px;
            border-bottom: 1px solid var(--border);
            background: rgba(21, 24, 32, 0.92);
            backdrop-filter: blur(8px);
        }

        .side-tab {
            flex: 1;
            appearance: none;
            border: 1px solid var(--border);
            background: var(--chip);
            color: var(--muted);
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
        }

        .side-tab.active {
            color: var(--text);
            border-color: rgba(77, 163, 255, 0.6);
            background: rgba(77, 163, 255, 0.12);
        }

        .side-panel {
            display: none;
            flex: 1;
            min-height: 0;
        }

        .side-panel.active {
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .panel-title {
            font-size: 13px;
            color: var(--muted);
        }

        .chat-messages {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 85%;
        }

        .message.user {
            background: #24323b;
            align-self: flex-end;
        }

        .message.assistant {
            background: #1d212a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            align-self: flex-start;
        }

        .composer {
            border-top: 1px solid var(--border);
            padding: 10px 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #userInput {
            width: 100%;
            box-sizing: border-box;
            resize: none;
            min-height: 54px;
            max-height: 160px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 10px;
            border-radius: 12px;
            outline: none;
        }

        .composer-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .switch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border: 1px solid var(--border);
            background: var(--chip);
            color: var(--muted);
            border-radius: 999px;
            cursor: pointer;
            user-select: none;
            font-size: 12px;
        }

        .switch input { margin: 0; }

        .timeline {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feed-item {
            display: flex;
            gap: 10px;
            background: #1d212a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 10px;
        }

        .feed-timestamp {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 11px;
            color: var(--muted);
            min-width: 78px;
            padding-top: 2px;
        }

        .feed-content {
            flex: 1;
            min-width: 0;
        }

        .feed-image {
            width: 100%;
            max-width: 320px;
            border-radius: 10px;
            display: block;
            background: #000;
        }

        .feed-text {
            font-size: 13px;
            line-height: 1.45;
        }

        .settings {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-section {
            border: 1px solid var(--border);
            background: var(--panel-2);
            border-radius: 14px;
            padding: 12px;
        }

        .settings-title {
            font-size: 13px;
            font-weight: 650;
            color: var(--text);
            margin-bottom: 10px;
        }

        .control-group { margin-bottom: 10px; }

        label { color: var(--muted); }

        input, select, textarea {
            background: #0b0d12;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 10px;
            outline: none;
        }

        textarea { resize: vertical; }

        button {
            padding: 9px 12px;
            background: var(--accent);
            color: #071019;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 650;
        }

        button:hover { background: var(--accent-2); color: #fff; }

        button.secondary { background: #2a2f3a; color: var(--text); }
        button.secondary:hover { background: #3a4150; }

        button.danger { background: var(--danger); color: #1b0b0b; }
        button.danger:hover { background: #ff3b3b; color: #fff; }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .row { display: flex; gap: 8px; align-items: center; }
        .row > * { flex: 1; }
        .row .fixed { flex: 0 0 auto; }
    </style>
</head>
<body>
    <div class="app-root">
        <div class="topbar">
            <div class="topbar-left">
                <div class="brand">LLM 直播伴侣</div>
                <div id="captureStatus" class="pill">未采集</div>
            </div>
        </div>

        <div class="workspace">
            <div class="stage">
                <div id="videoStage" class="video-stage"></div>
            </div>

            <aside class="side">
                <div class="side-tabs">
                    <button class="side-tab active" data-panel="panelChat">聊天</button>
                    <button class="side-tab" data-panel="panelTranscript">转录</button>
                    <button class="side-tab" data-panel="panelProgram">节目</button>
                    <button class="side-tab" data-panel="panelTurns">轮次</button>
                    <button class="side-tab" data-panel="panelSettings">设置</button>
                </div>

                <section id="panelProgram" class="side-panel">
                    <div class="panel-header">
                        <div class="panel-title">节目上下文管理</div>
                    </div>
                    <div class="settings">
                        <div class="settings-section">
                            <div class="settings-title">新建/更新节目信息</div>
                            <div class="control-group">
                                <label>节目/视频 URL</label>
                                <textarea id="programUrlInput" rows="2" placeholder="输入视频播放页 URL"></textarea>
                            </div>
                            <button id="analyzeProgramBtn">联网分析并保存</button>
                            <div id="analyzeStatus" style="font-size:12px; color:#aaa; margin-top:5px;"></div>
                        </div>

                        <div class="settings-section">
                            <div class="settings-title">已保存节目</div>
                            <select id="savedProgramsSelect" size="5" style="height:100px; margin-bottom:10px;"></select>
                            <div class="row">
                                <button id="loadProgramBtn" class="secondary">加载为当前上下文</button>
                                <button id="deleteProgramBtn" class="danger">删除</button>
                            </div>
                        </div>

                        <div class="settings-section">
                            <div class="settings-title">当前生效上下文</div>
                            <textarea id="currentProgramContext" rows="10" placeholder="当前未加载任何节目信息..." readonly style="font-size:12px; color:#ddd; background:#111;"></textarea>
                            <div style="font-size:11px; color:#666; margin-top:5px;">此内容将自动拼接到 System Prompt 中</div>
                        </div>
                    </div>
                </section>

                <section id="panelChat" class="side-panel active">
                    <div class="panel-header">
                        <div class="panel-title">聊天</div>
                        <button id="clearChatBtn" class="secondary fixed">清空</button>
                    </div>
                    <div id="chatMessages" class="chat-messages">
                        <div class="message assistant">你好！开始采集后，我会根据画面与转录陪你聊天。</div>
                    </div>
                    <div class="composer">
                        <textarea id="userInput" placeholder="关于视频内容提问..."></textarea>
                        <div class="composer-bar">
                            <label class="switch"><input type="checkbox" id="inlineEnableDeepThinking"><span>推理</span></label>
                            <label class="switch"><input type="checkbox" id="inlineEnableWebSearch"><span>联网</span></label>
                            <label class="switch"><input type="checkbox" id="inlineEnableAutoDanmu"><span>弹幕</span></label>
                            <button id="voiceInputBtn" class="fixed" title="按住或点击开始语音输入">🎤</button>
                            <button id="sendBtn" class="fixed">发送</button>
                        </div>
                    </div>
                </section>

                <section id="panelTranscript" class="side-panel">
                    <div class="panel-header">
                        <div class="panel-title">转录与画面时间线</div>
                        <div class="fixed" style="display:flex; gap:6px;">
                            <button id="clearFeedBtn" class="secondary">清空</button>
                            <button id="jumpLatestBtn" class="secondary">跳到最新</button>
                        </div>
                    </div>
                    <div id="feed" class="timeline"></div>
                </section>

                <section id="panelTurns" class="side-panel">
                    <div class="panel-header">
                        <div class="panel-title">发给模型的轮次</div>
                        <button id="clearTurnsBtn" class="secondary fixed">清空</button>
                    </div>
                    <div id="turnsList" class="timeline"></div>
                </section>

                <section id="panelSettings" class="side-panel">
                    <div class="settings">
                        <div class="settings-section">
                            <div class="settings-title">采集控制</div>
                            <div class="row">
                                <button id="startBtn">开始采集</button>
                                <button id="stopBtn" class="danger" disabled>停止采集</button>
                                <button id="clearBtn" class="secondary">清空数据</button>
                            </div>
                            <div class="control-group" style="margin-top:10px;">
                                <label>截图间隔 (秒)</label>
                                <input type="number" id="intervalInput" value="5" min="1">
                            </div>
                        </div>

                        <div class="settings-section">
                            <div class="settings-title">语音转文字</div>
                            <div class="control-group">
                                <label>音频来源</label>
                                <select id="audioSourceSelect">
                                    <option value="volcengine">火山引擎 ASR (推荐)</option>
                                    <option value="web_speech">Web Speech API (麦克风)</option>
                                </select>
                            </div>

                            <div id="volcengineConfig" class="control-group">
                                <label>App ID</label>
                                <input type="text" id="volcAppId" placeholder="App ID">
                                <label>Access Token</label>
                                <input type="password" id="volcAccessToken" placeholder="Access Token">
                                <label>Secret Key</label>
                                <input type="password" id="volcSecretKey" placeholder="Secret Key (可选，Token模式无需填写)">
                                <label>ASR 地址</label>
                                <input type="text" id="asrUrl" placeholder="wss://openspeech.bytedance.com/api/v3/sauc/bigmodel_async">
                                <label>Resource ID</label>
                                <input type="text" id="asrResourceId" placeholder="volc.bigasr.sauc.duration">
                                <label>分包时长 (ms)</label>
                                <input type="number" id="asrChunkMs" value="200" min="80" step="10">
                            </div>
                            <div id="audioLevel" style="height:6px; background:rgba(255,255,255,0.08); width:0%; border-radius:999px;"></div>
                        </div>

                        <div class="settings-section">
                            <div class="settings-title">LLM</div>
                            <div class="control-group">
                                <label>API Endpoint</label>
                                <input type="text" id="apiEndpoint" value="https://ark-cn-beijing.bytedance.net/api/v3/responses">
                            </div>
                            <div class="control-group">
                                <label>API Key</label>
                                <input type="password" id="apiKey" placeholder="ARK_API_KEY">
                            </div>
                            <div class="control-group">
                                <label>模型名称</label>
                                <input type="text" id="modelName" value="ep-20260201173016-nwssm">
                            </div>
                            <div class="control-group">
                                <label>System Prompt</label>
                                <textarea id="systemPrompt" rows="4">你是一位知性、幽默、通透的看片搭子（风格：梁文道+李雪琴+李诞+鲁豫）。说话松弛有度，拒绝烂梗和惊叹号。能跳出表面剧情，一针见血地洞察人性逻辑与荒谬之处。遇到不懂的搜索作背景，严禁剧透。</textarea>
                            </div>
                            <div class="row">
                                <label class="switch"><input type="checkbox" id="enableDeepThinking"><span>推理</span></label>
                                <select id="deepThinkingEffort">
                                    <option value="low">low</option>
                                    <option value="medium">medium</option>
                                    <option value="high">high</option>
                                </select>
                            </div>
                            <div class="control-group" style="margin-top:10px;">
                                <label class="switch"><input type="checkbox" id="enableWebSearch"><span>联网</span></label>
                            </div>
                            <div class="control-group">
                                <label>上下文保留时长 (分钟)</label>
                                <input type="number" id="contextWindowMin" value="6" min="1" max="180">
                            </div>
                            <div class="control-group">
                                <label>上下文最大 Token 数 (预估)</label>

    <script>
        // --- DOM Elements ---

        const volcSecretKey = document.getElementById('volcSecretKey');

        const enableWebSearchEl = document.getElementById('enableWebSearch');

        // --- State ---
